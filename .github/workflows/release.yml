name: Attach single-file html to release

# Fires when a release tag is pushed (e.g. v0.2.4). Builds the self-contained
# single-file html and attaches it to the matching GitHub Release.
# Only listen to tag pushes (not also release:published) to avoid racing
# duplicate jobs that fight over the same asset upload.
on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-attach:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck and test
        run: npm run typecheck && npm test
      - name: Build single-file html
        run: npm run build:single
      - name: Compute version
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Rename for download
        run: cp dist-single/index.html "resume-editor-${{ steps.ver.outputs.version }}.html"
      - name: Ensure release exists, then upload asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.ver.outputs.version }}"
          # If no release exists for this tag yet, create one with the asset.
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "Automated build. See commit history for changes." \
              "resume-editor-${TAG}.html"
          else
            # Release was created manually (e.g. via gh release create); attach/replace asset.
            gh release upload "$TAG" "resume-editor-${TAG}.html" --clobber
          fi
